name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-24.04-arm
          - target: x86_64-apple-darwin
            os: macos-14
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools
      - run: cargo build --release --target ${{ matrix.target }} -p ams-cli
      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          asset=ams-${{ github.ref_name }}-${{ matrix.target }}.tar.gz
          tar -C target/${{ matrix.target }}/release -czf "$asset" ams
          if command -v sha256sum >/dev/null; then
            sha256sum "$asset" > "$asset.sha256"
          else
            shasum -a 256 "$asset" > "$asset.sha256"
          fi
      - name: Package (windows)
        if: runner.os == 'Windows'
        run: |
          $asset = "ams-${{ github.ref_name }}-${{ matrix.target }}.zip"
          Compress-Archive -Path target/${{ matrix.target }}/release/ams.exe -DestinationPath $asset
          $hash = (Get-FileHash $asset -Algorithm SHA256).Hash.ToLower()
          "$hash  $asset" | Out-File -Encoding ascii "$asset.sha256"
      - uses: softprops/action-gh-release@v2
        with:
          files: ams-${{ github.ref_name }}-${{ matrix.target }}.*
